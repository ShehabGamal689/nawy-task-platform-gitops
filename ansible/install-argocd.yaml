- name: Bootstrap EKS with Argo CD
  hosts: localhost
  connection: local
  tasks:
    - name: Create argocd namespace
      kubernetes.core.k8s:
        name: argocd
        api_version: v1
        kind: Namespace
        state: present

    - name: Install Argo CD (Lightweight Version)
      kubernetes.core.k8s:
        state: present
        namespace: argocd
        src: https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml

    - name: Install Argo CD Image Updater
      kubernetes.core.k8s:
        state: present
        namespace: argocd
        src: https://raw.githubusercontent.com/argoproj-labs/argocd-image-updater/stable/manifests/install.yaml

    - name: Apply Argo CD Root App
      kubernetes.core.k8s:
        state: present
        src: ../manifests/root-app.yaml
