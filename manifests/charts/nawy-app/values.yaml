replicaCount: 2

image:
  repository: ghcr.io/shehabgamal689/nawy-task-app
  tag: "latest" 
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: "alb" 
  hosts:
    - host: nawy-app.local
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi
