apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: newrelic-secret-sync
  namespace: newrelic       
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: newrelic-key      
    creationPolicy: Owner
  data:
    - secretKey: licenseKey 
      remoteRef:
        key: gitops-secrets-vault
        property: newrelic_key 
