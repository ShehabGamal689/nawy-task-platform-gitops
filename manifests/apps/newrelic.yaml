apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: newrelic-bundle
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1" 
spec:
  project: default
  source:
    repoURL: 'https://helm-charts.newrelic.com'
    chart: nri-bundle
    targetRevision: 5.0.8
    helm:
      values: |
        global:
          licenseKey: "eb60b1f8612a460cd613d404b8c44182f0dfNRAL"
          cluster: "nawy-cluster"
        newrelic-infrastructure:
          privileged: true
          ksm: # Fixed: changed from kms to ksm (Kube State Metrics)
            resources: # Fixed: removed the extra :s typo
              limits:
                memory: 256Mi # Fixed: removed space
              requests:
                memory: 128Mi
        newrelic-logging:
          enabled: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: newrelic
  syncPolicy:
    automated:
      prune: true
      selfHeal: true 
    syncOptions:
      - CreateNamespace=true
